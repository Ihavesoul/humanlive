name: CI

# Commit gate for the native-only build (ADR 0002 / DRE-9).
# Three independent jobs, all must pass:
#   1. reference-validate — PoC reference integrity (data/specs/prompts JSON + XLSX).
#   2. backend            — Kotlin/JVM tests for :server + :core:domain.
#   3. android            — native :app:assembleDebug (Jetpack Compose client).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  reference-validate:
    name: PoC reference validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate PoC reference integrity (required files + JSON + XLSX)
        run: python3 scripts/validate_build.py

  backend:
    name: Backend + domain tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Test :server and :core:domain
        run: ./gradlew :core:domain:test :server:test --no-daemon

  android:
    name: Native :app build (Compose)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # JDK 17 is required, not optional: AGP 8.13's JdkImageTransform runs
      # `jlink` on the Gradle JVM and breaks on JDK >=21 (e.g. host default 26)
      # while building the android JDK image. Do not bump without re-checking
      # jlink compatibility. (DRE-15)
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-35
            build-tools;35.0.0
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-android-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-android-
      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
