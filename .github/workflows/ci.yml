name: CI

# Commit gate for the PWA-first build (ADR 0001 / DRE-8).
# Two independent jobs, both must pass:
#   1. pwa-validate  — the PoC build validator over repo integrity (no build step for the PWA itself).
#   2. backend       — Kotlin/JVM tests for :server + :core:domain. No Android SDK required.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pwa-validate:
    name: PoC build validator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate PoC integrity (required files + JSON + XLSX)
        run: python3 scripts/validate_build.py

  backend:
    name: Backend + domain tests (JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle/libs.versions.toml') }}
          restore-keys: gradle-${{ runner.os }}-
      - name: Test :server and :core:domain
        run: ./gradlew :core:domain:test :server:test --no-daemon
